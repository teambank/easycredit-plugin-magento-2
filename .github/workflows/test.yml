name: Test

on:
  push:
    branches:
    - '*'
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 15
      fail-fast: false
      matrix:
        include:
          # wontfix for this very old version: "Payment model name is not provided in config"
          #- magento-version: '2.4.1'
          #  php-version: 7.4
          #  composer-version: 'v1'
          #  search-engine: 'elasticsearch7'
          - magento-version: '2.4.2'
            php-version: 7.4
            composer-version: 'v2'
            search-engine: 'elasticsearch7'
          - magento-version: '2.4.3-p3'
            php-version: 7.4
            composer-version: 'v2'
            search-engine: 'elasticsearch7'
          - magento-version: '2.4.4'
            php-version: 8.1
            composer-version: 'v2'
            search-engine: 'elasticsearch7'
          - magento-version: '2.4.5'
            php-version: 8.1
            composer-version: 'v2'
            search-engine: 'elasticsearch7'
          - magento-version: '2.4.6-p2'
            php-version: 8.2
            composer-version: 'v2'
            search-engine: 'elasticsearch7'
          - magento-version: '2.4.7'
            php-version: 8.3
            composer-version: 'v2'
            search-engine: 'elasticsearch7'
          - magento-version: '2.4.8'
            php-version: 8.3
            composer-version: 'v2'
            search-engine: 'elasticsearch8'
          - magento-version: '2.4.9'
            php-version: 8.5
            composer-version: 'v2'
            search-engine: 'elasticsearch8'

    name: Magento ${{ matrix.magento-version }}

    env:
      MAGENTO_DIR: /opt/magento/
      PLUGIN_DIR: vendor/teambank/easycredit-plugin-magento-2/

    services:
      mysql:
        image: mysql:8.0.20
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306

      elasticsearch:
        image: elasticsearch:7.17.10
        env:
          discovery.type: single-node
        options: >-
          --health-cmd "curl http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 9200:9200

    steps:
      - name: Install PHP
        uses: shivammathur/setup-php@master
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, gd, bcmath, ctype, curl, dom, hash, iconv, intl, opcache, openssl, simplexml, soap, xsl, zip
          tools: composer:${{ matrix.composer-version }}
          coverage: none
          ini-values: opcache.enable=1, opcache.enable_cli=1, opcache.memory_consumption=512, opcache.max_accelerated_files=60000, realpath_cache_size=10M, realpath_cache_ttl=7200
      - name: Checkout
        uses: actions/checkout@master
      - name: Debug
        run: |
          php -v
          php -m
          composer -V
          env
          curl http://localhost:9200
      - name: Setup Magento 2
        run: |
          export WORKSPACE="${GITHUB_WORKSPACE}"
          export MAGENTO_DIR="${MAGENTO_DIR}"
          export MAGENTO_CLONE=1
          export MAGENTO_VERSION="${{ matrix.magento-version }}"
          export PLUGIN_SOURCE=composer
          export PLUGIN_CONSTRAINT="dev-${GITHUB_REF##*/}#${GITHUB_SHA}"
          export BASE_URL="http://localhost/"
          export DB_HOST="127.0.0.1"
          export SEARCH_ENGINE="${{ matrix.search-engine }}"
          export SEARCH_HOST="localhost"
          export SEARCH_PORT="9200"
          export EASYCREDIT_API_KEY="${{ secrets.EASYCREDITAPIKEY }}"
          export EASYCREDIT_API_TOKEN="${{ secrets.EASYCREDITAPIPASSWORD }}"
          export EASYCREDIT_API_SIGNATURE="${{ secrets.EASYCREDITAPISIGNATURE }}"
          bash "${GITHUB_WORKSPACE}/.devcontainer/scripts/install-magento-store.sh"

      - name: Static Analyze
        env:
          MAGENTO_DIR: /opt/magento
          MAGENTO_VENDOR_DIR: /opt/magento/vendor
          PLUGIN_PATH: /opt/magento/vendor/teambank/easycredit-plugin-magento-2
        run: |
          if [[ "${{ matrix.magento-version }}" == "2.4.7" || "${{ matrix.magento-version }}" == "2.4.8" || "${{ matrix.magento-version }}" == "2.4.9" ]]; then
            echo "Using PHPStan 2.x from plugin workspace (Magento root keeps rector/phpstan 1.x via magento-coding-standard)"
            cd "$GITHUB_WORKSPACE"
            composer install --no-interaction --prefer-dist
            php vendor/bin/phpstan analyse . -c phpstan.neon
          else
            echo "Using PHPStan 1.x in Magento vendor for ${{ matrix.magento-version }}"
            cd $MAGENTO_DIR
            composer require phpstan/phpstan:^1.10 bitexpert/phpstan-magento:^0.30 --update-with-all-dependencies --no-interaction
            cd "$PLUGIN_PATH"
            php $MAGENTO_DIR/vendor/bin/phpstan analyse . -c "$GITHUB_WORKSPACE/phpstan.magento.neon"
          fi
      - name: Coding Style
        if: ${{ matrix.magento-version == '2.4.7' }}
        env:
          PLUGIN_PATH: /opt/magento/vendor/teambank/easycredit-plugin-magento-2
        run: |
          cd $MAGENTO_DIR
          composer require friendsofphp/php-cs-fixer symplify/easy-coding-standard --dev
          php vendor/bin/ecs check -c "$PLUGIN_PATH/ecs.php" "$PLUGIN_PATH"
      - name: Install Dependencies
        run: |
          npm install --global yarn
          yarn install --frozen-lockfile
      - name: Setup Playwright
        run: |
          # fixes:  Repository 'https://ppa.launchpadcontent.net/ondrej/php/ubuntu noble InRelease' changed its 'Label' value from '***** The main PPA for supported PHP versions with many PECL extensions *****' to 'PPA for PHP'
          sudo apt-get update -o Acquire::AllowReleaseInfoChange=true 
          yarn playwright install --with-deps chromium
      - name: Playwright E2E Tests
        run: |
          cd $GITHUB_WORKSPACE
          VERSION=${{ matrix.magento-version }} yarn playwright test -c tests/
      - name: Save Magento Logs for Debugging
        if: always()
        run: |
          LOG_DIR=playwright-report/logs
          mkdir $LOG_DIR
          cp -r $MAGENTO_DIR/var/log/* $LOG_DIR/
          for i in $LOG_DIR/*; do
            echo "<a href=\"$(basename $i)\">$i</a><br />" >> $LOG_DIR/index.html
          done;
      - name: Deploy Report
        if: always()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy playwright-report/ --project-name=easycredit-playwright-reports
