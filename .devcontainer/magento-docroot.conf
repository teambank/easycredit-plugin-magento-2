# /var/www/html is a symlink to workspace pub (stub before install, magento/pub after install-magento-store.sh).
# Debian 000-default uses AllowOverride None under /var/www/; Magento storefront needs .htaccess.
<Directory /var/www/html>
    DirectoryIndex index.php index.html
    Options FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>
